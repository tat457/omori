<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天秤バランスゲーム</title>
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

:root {
    --sky-top: #dff4ff;
    --sky-bottom: #f7fbff;
    --panel-bg: rgba(255, 255, 255, 0.92);
    --panel-border: rgba(85, 110, 130, 0.18);
    --metal-1: #eef3f8;
    --metal-2: #98a8b8;
    --metal-3: #5d6772;
    --gold-1: #f8df86;
    --gold-2: #d49a27;
    --gold-3: #85561a;
    --wood-1: #926134;
    --wood-2: #6f421d;
    --accent: #2e7be9;
    --accent-dark: #1d5dba;
    --good: #1e8c3a;
    --bad: #c72c41;
}

body {
    font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    overflow-y: hidden;
    user-select: none;
    color: #17324a;
    background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.95), transparent 40%),
        linear-gradient(180deg, var(--sky-top), var(--sky-bottom) 64%, #e1f0da 64%, #b9d890 100%);
}

body::after {
    content: "";
    position: fixed;
    inset: auto 0 0 0;
    height: 24vh;
    background:
        radial-gradient(circle at 15% 30%, rgba(255, 255, 255, 0.22), transparent 18%),
        radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.16), transparent 14%),
        linear-gradient(180deg, rgba(0, 0, 0, 0), rgba(67, 114, 31, 0.08));
    pointer-events: none;
}

#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 20;
    width: min(250px, calc(100vw - 20px));
    padding: 10px 11px;
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    background: var(--panel-bg);
    box-shadow: 0 10px 28px rgba(35, 63, 92, 0.14);
    backdrop-filter: blur(6px);
}

#title {
    font-size: 19px;
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: 0.02em;
}

.controlRow {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
}

.controlRow label,
.miniLabel {
    font-size: 12px;
    font-weight: 700;
    color: #4c6478;
}

select,
button {
    border: none;
    border-radius: 11px;
    font-size: 14px;
}

select {
    flex: 1;
    padding: 8px 10px;
    color: #17324a;
    background: #f4f8fc;
    border: 1px solid rgba(76, 100, 120, 0.16);
}

#mission {
    font-size: 15px;
    line-height: 1.5;
    margin-bottom: 8px;
    font-weight: 700;
}

#scoreBoard {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 8px;
}

.statCard {
    padding: 7px 8px;
    border-radius: 12px;
    background: #f5f9fd;
    border: 1px solid rgba(76, 100, 120, 0.1);
}

.statCard strong {
    display: block;
    font-size: 15px;
    margin-top: 2px;
}

#totalInfo {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
}

.totalPill {
    flex: 1;
    font-size: 12px;
    font-weight: 700;
    color: #34506a;
    background: #eff6fc;
    border: 1px solid rgba(76, 100, 120, 0.12);
    border-radius: 999px;
    padding: 6px 10px;
}

.buttonRow {
    display: flex;
    gap: 8px;
}

button {
    padding: 10px 12px;
    color: #fff;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
}

button:hover {
    opacity: 0.96;
    transform: translateY(-1px);
}

#checkBtn {
    flex: 1;
    background: linear-gradient(180deg, var(--accent), var(--accent-dark));
}

#resetBtn {
    background: linear-gradient(180deg, #9aa8b6, #718091);
}

#codeBtn {
    background: linear-gradient(180deg, #3f9c7a, #2f7c61);
}

#message {
    margin-top: 8px;
    min-height: 24px;
    font-size: 14px;
    font-weight: 800;
}

.correct {
    color: var(--good);
}

.wrong {
    color: var(--bad);
}

#codeViewer {
    margin-top: 8px;
    display: none;
}

#codeViewer.open {
    display: block;
}

#codeOutput {
    width: 100%;
    height: 180px;
    resize: vertical;
    border: 1px solid rgba(76, 100, 120, 0.18);
    border-radius: 12px;
    padding: 10px;
    background: #f7fafc;
    color: #17324a;
    font-size: 11px;
    line-height: 1.55;
    font-family: "SFMono-Regular", "Consolas", "Menlo", monospace;
    white-space: pre;
}

#gameArea {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
}

#scale {
    position: absolute;
    left: 50%;
    top: 54%;
    transform: translate(-50%, -50%);
    width: min(860px, 92vw);
    height: min(460px, 54vh);
}

#shadow {
    position: absolute;
    left: 50%;
    bottom: 14px;
    transform: translateX(-50%);
    width: 58%;
    height: 28px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0, 0, 0, 0.24), rgba(0, 0, 0, 0) 72%);
    filter: blur(8px);
}

#base {
    position: absolute;
    left: 50%;
    bottom: 34px;
    transform: translateX(-50%);
    width: 120px;
    height: 220px;
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    background: linear-gradient(90deg, #6c3e1d, #9b6735 40%, #6c3e1d);
    box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.12), 0 18px 22px rgba(0, 0, 0, 0.18);
}

#basePedestal {
    position: absolute;
    left: 50%;
    bottom: 0;
    transform: translateX(-50%);
    width: 220px;
    height: 42px;
    border-radius: 28px;
    background: linear-gradient(180deg, #a8753e, #6f421d);
    box-shadow: inset 0 3px 6px rgba(255, 255, 255, 0.22), 0 10px 18px rgba(0, 0, 0, 0.2);
}

#pivot {
    position: absolute;
    left: 50%;
    top: 120px;
    transform: translateX(-50%);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fefefe, #afbac4 48%, #5d6772 78%);
    box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.16), 0 6px 10px rgba(0, 0, 0, 0.18);
    z-index: 3;
}

#beam {
    position: absolute;
    left: 50%;
    top: 136px;
    transform: translateX(-50%);
    transform-origin: center center;
    width: min(620px, 74vw);
    height: 24px;
    border-radius: 999px;
    background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.15) 30%, rgba(0, 0, 0, 0.14) 31%, rgba(0, 0, 0, 0.05)),
        linear-gradient(90deg, #718190, #dbe3ea 18%, #8694a2 50%, #dbe3ea 82%, #5f6c79);
    box-shadow: inset 0 2px 2px rgba(255, 255, 255, 0.4), inset 0 -3px 4px rgba(0, 0, 0, 0.16), 0 12px 14px rgba(0, 0, 0, 0.15);
    z-index: 2;
    transition: transform 0.35s ease;
}

.hanger {
    position: absolute;
    top: 126px;
    width: 120px;
    height: 110px;
    z-index: 1;
}

#leftHanger {
    left: max(32px, calc(50% - min(310px, 37vw) - 60px));
}

#rightHanger {
    right: max(32px, calc(50% - min(310px, 37vw) - 60px));
}

.chain {
    position: absolute;
    width: 4px;
    border-radius: 999px;
    background: linear-gradient(180deg, #f5f8fb, #6b7985);
    box-shadow: 0 0 2px rgba(0, 0, 0, 0.12);
}

.chain.left {
    left: 18px;
}

.chain.center {
    left: 58px;
}

.chain.right {
    right: 18px;
}

.chain.top {
    top: 0;
    height: 54px;
}

.chain.bottom {
    top: 54px;
    height: 34px;
}

.plate {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 120px;
    height: 26px;
    border-radius: 50%;
    background:
        radial-gradient(circle at 50% 25%, #ffffff, #bfcbd6 48%, #7d8b98 72%, #5d6772);
    box-shadow: inset 0 -5px 6px rgba(0, 0, 0, 0.22), 0 10px 12px rgba(0, 0, 0, 0.14);
}

.dropZone {
    position: absolute;
    left: -24px;
    bottom: -8px;
    width: 168px;
    height: 112px;
    border: 2px dashed rgba(36, 64, 92, 0.18);
    border-radius: 24px;
}

.dropZone.active {
    border-color: rgba(46, 123, 233, 0.55);
    background: rgba(46, 123, 233, 0.06);
}

#weightArea {
    position: absolute;
    left: 50%;
    bottom: 12px;
    transform: translateX(-50%);
    width: min(980px, 96vw);
    min-height: 180px;
    padding: 18px;
    border-radius: 28px 28px 18px 18px;
    background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(244, 248, 252, 0.9)),
        repeating-linear-gradient(90deg, rgba(148, 111, 67, 0.05) 0 14px, rgba(255, 255, 255, 0.05) 14px 28px);
    border: 1px solid rgba(91, 109, 122, 0.12);
    box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    align-items: center;
}

.weight {
    position: relative;
    width: 92px;
    height: 96px;
    border-radius: 18px 18px 24px 24px;
    background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0) 28%),
        linear-gradient(180deg, var(--gold-1), var(--gold-2) 62%, var(--gold-3));
    box-shadow:
        inset 0 2px 5px rgba(255, 255, 255, 0.55),
        inset 0 -9px 12px rgba(90, 51, 0, 0.18),
        0 10px 16px rgba(86, 53, 9, 0.26);
    border: 1px solid rgba(90, 51, 0, 0.2);
    color: #593504;
    cursor: grab;
    touch-action: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    text-align: center;
    font-variant-numeric: tabular-nums;
}

.weight::before {
    content: "";
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 34px;
    height: 18px;
    border: 5px solid #946116;
    border-bottom: none;
    border-radius: 16px 16px 0 0;
    background: transparent;
}

.weight::after {
    content: "";
    position: absolute;
    inset: 14px;
    border-radius: 14px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0));
    pointer-events: none;
}

.weight.dragging {
    cursor: grabbing;
    box-shadow:
        inset 0 2px 5px rgba(255, 255, 255, 0.55),
        inset 0 -9px 12px rgba(90, 51, 0, 0.18),
        0 18px 24px rgba(41, 55, 69, 0.28);
}

.weightValue {
    position: relative;
    z-index: 1;
    font-size: 24px;
    font-weight: 900;
    line-height: 1;
}

.weightUnit {
    position: relative;
    z-index: 1;
    font-size: 14px;
    font-weight: 800;
    opacity: 0.88;
}

@media (max-width: 920px) {
    #ui {
        width: min(232px, calc(100vw - 16px));
        top: 8px;
        left: 8px;
        padding: 9px 10px;
    }

    #title {
        font-size: 17px;
    }

    #mission {
        font-size: 14px;
    }

    #scale {
        top: 50%;
        width: 96vw;
        height: 42vh;
    }

    #beam {
        width: min(510px, 72vw);
    }

    .hanger {
        transform: scale(0.9);
        transform-origin: top center;
    }

    #weightArea {
        min-height: 170px;
        padding: 14px;
        gap: 12px;
    }

    .weight {
        width: 78px;
        height: 82px;
    }

    .weightValue {
        font-size: 20px;
    }

    .weightUnit {
        font-size: 12px;
    }
}

@media (max-width: 1024px) and (orientation: portrait) {
    #ui {
        width: min(230px, calc(100vw - 20px));
    }

    #scale {
        top: 46%;
        height: min(430px, 44vh);
    }

    #weightArea {
        width: min(94vw, 860px);
        min-height: 170px;
        padding: 14px;
    }

    .buttonRow {
        flex-wrap: wrap;
    }

    .buttonRow button {
        flex: 1 1 calc(50% - 4px);
    }

    #codeBtn {
        flex-basis: 100%;
    }
}

@media (max-width: 768px) {
    body {
        overflow-x: hidden;
        overflow-y: auto;
    }

    #gameArea {
        width: 100%;
        height: auto;
        min-height: calc(100dvh - 8px);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 8px 0 24px;
    }

    #ui {
        position: relative;
        top: auto;
        left: auto;
        width: min(94vw, 520px);
        margin: 0 auto 10px;
        padding: 10px;
    }

    .controlRow {
        flex-wrap: wrap;
        align-items: stretch;
    }

    .controlRow label {
        width: 100%;
    }

    select {
        width: 100%;
    }

    #scoreBoard,
    #totalInfo {
        grid-template-columns: 1fr 1fr;
        width: 100%;
    }

    .buttonRow {
        flex-wrap: wrap;
    }

    .buttonRow button {
        flex: 1 1 calc(50% - 4px);
        min-height: 44px;
    }

    #codeBtn {
        flex-basis: 100%;
    }

    #codeOutput {
        height: 220px;
        font-size: 10px;
    }

    #scale {
        position: relative;
        left: auto;
        top: auto;
        transform: none;
        width: min(96vw, 700px);
        height: 280px;
        margin: 0 auto 10px;
    }

    #shadow {
        width: 64%;
    }

    #beam {
        top: 96px;
        width: min(410px, 78vw);
        height: 20px;
    }

    #pivot {
        top: 82px;
        width: 34px;
        height: 34px;
    }

    #base {
        width: 86px;
        height: 156px;
        bottom: 30px;
    }

    #basePedestal {
        width: 170px;
        height: 36px;
    }

    .hanger {
        top: 90px;
        transform: scale(0.7);
    }

    #leftHanger {
        left: max(4px, calc(50% - min(250px, 35vw) - 60px));
    }

    #rightHanger {
        right: max(4px, calc(50% - min(250px, 35vw) - 60px));
    }

    #weightArea {
        position: relative;
        left: auto;
        bottom: auto;
        transform: none;
        width: min(94vw, 720px);
        min-height: 160px;
        padding: 12px;
        border-radius: 22px;
        gap: 10px;
        margin: 0 auto;
    }

    .weight {
        width: 72px;
        height: 76px;
        border-radius: 16px 16px 22px 22px;
    }

    .weight::before {
        top: -12px;
        width: 28px;
        height: 16px;
        border-width: 4px;
    }

    .weightValue {
        font-size: 18px;
    }

    .weightUnit {
        font-size: 11px;
    }
}

@media (max-width: 480px) {
    #ui {
        width: min(95vw, 420px);
        border-radius: 14px;
    }

    #title {
        font-size: 16px;
    }

    #mission {
        font-size: 13px;
    }

    #scoreBoard {
        grid-template-columns: 1fr;
    }

    #totalInfo {
        flex-direction: column;
    }

    .buttonRow button {
        flex-basis: 100%;
        font-size: 13px;
        padding: 11px 10px;
    }

    #scale {
        height: 250px;
    }

    #beam {
        top: 86px;
        width: min(320px, 80vw);
        height: 16px;
    }

    #pivot {
        top: 74px;
        width: 28px;
        height: 28px;
    }

    #base {
        width: 70px;
        height: 132px;
        bottom: 24px;
    }

    #basePedestal {
        width: 140px;
        height: 30px;
    }

    .hanger {
        top: 80px;
        transform: scale(0.54);
    }

    #leftHanger {
        left: max(-18px, calc(50% - min(202px, 34vw) - 60px));
    }

    #rightHanger {
        right: max(-18px, calc(50% - min(202px, 34vw) - 60px));
    }

    #weightArea {
        width: 95vw;
        min-height: 152px;
        padding: 10px;
        gap: 8px;
    }

    .weight {
        width: 62px;
        height: 66px;
    }

    .weightValue {
        font-size: 16px;
    }

    .weightUnit {
        font-size: 10px;
    }

    #codeOutput {
        height: 180px;
    }
}
</style>
</head>
<body>
<div id="ui">
    <div id="title">天秤バランスゲーム</div>

    <div class="controlRow">
        <label for="difficulty">難易度</label>
        <select id="difficulty">
            <option value="easy">やさしい</option>
            <option value="normal" selected="">ふつう</option>
            <option value="hard">むずかしい</option>
        </select>
    </div>

    <div id="mission">右を重くしよう！</div>

    <div id="scoreBoard">
        <div class="statCard">
            <span class="miniLabel">スコア</span>
            <strong id="scoreValue">0</strong>
        </div>
        <div class="statCard">
            <span class="miniLabel">おもり数</span>
            <strong id="weightCount">7</strong>
        </div>
    </div>

    <div id="totalInfo">
        <div class="totalPill" id="leftTotal">左: 0g</div>
        <div class="totalPill" id="rightTotal">右: 0g</div>
    </div>

    <div class="buttonRow">
        <button id="checkBtn" type="button">判定</button>
        <button id="resetBtn" type="button">やり直し</button>
        <button id="codeBtn" type="button">コード表示</button>
    </div>

    <div id="message" aria-live="polite" class=""></div>

    <div id="codeViewer" aria-live="polite" class="open">
        <textarea id="codeOutput" readonly="" aria-label="HTMLコード表示欄"></textarea>
    </div>
</div>

<div id="gameArea">
    <div id="scale">
        <div id="shadow"></div>
        <div id="base"></div>
        <div id="basePedestal"></div>
        <div id="beam" style="transform: translateX(-50%) rotate(0deg);"></div>
        <div id="pivot"></div>

        <div class="hanger" id="leftHanger">
            <div class="chain top left"></div>
            <div class="chain top center"></div>
            <div class="chain top right"></div>
            <div class="chain bottom left"></div>
            <div class="chain bottom right"></div>
            <div class="plate"></div>
            <div class="dropZone" id="leftZone"></div>
        </div>

        <div class="hanger" id="rightHanger">
            <div class="chain top left"></div>
            <div class="chain top center"></div>
            <div class="chain top right"></div>
            <div class="chain bottom left"></div>
            <div class="chain bottom right"></div>
            <div class="plate"></div>
            <div class="dropZone" id="rightZone"></div>
        </div>
    </div>

    <div id="weightArea" aria-label="おもり置き場"><div class="weight" data-grams="5629" data-label="5629g"><div class="weightValue">5629</div><div class="weightUnit">g</div></div><div class="weight" data-grams="9763" data-label="9763g"><div class="weightValue">9763</div><div class="weightUnit">g</div></div><div class="weight" data-grams="110" data-label="110g"><div class="weightValue">110</div><div class="weightUnit">g</div></div><div class="weight" data-grams="5450" data-label="5450g"><div class="weightValue">5450</div><div class="weightUnit">g</div></div><div class="weight" data-grams="412" data-label="412g"><div class="weightValue">412</div><div class="weightUnit">g</div></div><div class="weight" data-grams="7240" data-label="7240g"><div class="weightValue">7240</div><div class="weightUnit">g</div></div><div class="weight" data-grams="5455" data-label="5455g"><div class="weightValue">5455</div><div class="weightUnit">g</div></div></div>
</div>

<script>
const weightArea = document.getElementById("weightArea");
const leftZone = document.getElementById("leftZone");
const rightZone = document.getElementById("rightZone");
const beam = document.getElementById("beam");
const message = document.getElementById("message");
const scoreValue = document.getElementById("scoreValue");
const missionText = document.getElementById("mission");
const difficultySelect = document.getElementById("difficulty");
const leftTotal = document.getElementById("leftTotal");
const rightTotal = document.getElementById("rightTotal");
const weightCount = document.getElementById("weightCount");
const checkBtn = document.getElementById("checkBtn");
const resetBtn = document.getElementById("resetBtn");
const codeBtn = document.getElementById("codeBtn");
const codeViewer = document.getElementById("codeViewer");
const codeOutput = document.getElementById("codeOutput");

let score = 0;
let leftWeights = [];
let rightWeights = [];
let currentMission = null;
let clearMessageTimer = 0;
let missionTimer = 0;

const missions = [
    {
        text: "左右を同じ重さにしよう！",
        check: (left, right) => left === right
    },
    {
        text: "左を重くしよう！",
        check: (left, right) => left > right
    },
    {
        text: "右を重くしよう！",
        check: (left, right) => right > left
    }
];

const difficultySettings = {
    easy: {
        name: "やさしい",
        minCount: 5,
        maxCount: 7,
        createValue: () => ({
            grams: randomInt(1, 100),
            label: null
        })
    },
    normal: {
        name: "ふつう",
        minCount: 5,
        maxCount: 7,
        createValue: () => ({
            grams: randomInt(100, 10000),
            label: null
        })
    },
    hard: {
        name: "むずかしい",
        minCount: 6,
        maxCount: 8,
        createValue: () => createMixedUnitWeight()
    }
};

function randomInt(min, max) {
    const safeMin = Math.ceil(min);
    const safeMax = Math.floor(max);
    return Math.floor(Math.random() * (safeMax - safeMin + 1)) + safeMin;
}

function pickMission() {
    currentMission = missions[randomInt(0, missions.length - 1)];
    missionText.textContent = currentMission.text;
}

function clearTimers() {
    if (clearMessageTimer) {
        clearTimeout(clearMessageTimer);
        clearMessageTimer = 0;
    }
    if (missionTimer) {
        clearTimeout(missionTimer);
        missionTimer = 0;
    }
}

function showMessage(text, type) {
    message.textContent = text;
    message.className = type;
}

function clearMessageLater() {
    if (clearMessageTimer) {
        clearTimeout(clearMessageTimer);
    }
    clearMessageTimer = window.setTimeout(() => {
        message.textContent = "";
        message.className = "";
    }, 1600);
}

function newMission() {
    clearTimers();
    pickMission();
    resetBoard();
}

function resetBoard() {
    leftWeights = [];
    rightWeights = [];

    document.querySelectorAll(".weight").forEach((weight) => {
        weight.remove();
    });

    createWeights();
    updateScale();
    showMessage("", "");
}

function createMixedUnitWeight() {
    const useKilogramLabel = Math.random() < 0.5;
    if (useKilogramLabel) {
        const wholeKg = randomInt(1, 9);
        return {
            grams: wholeKg * 1000,
            label: `${wholeKg}kg`
        };
    }

    return {
        grams: randomInt(100, 900),
        label: null
    };
}

function formatWeightLabel(grams, forcedLabel) {
    if (forcedLabel) {
        return forcedLabel;
    }
    return `${grams}g`;
}

function splitWeightLabel(label) {
    const matched = /^(\d+)(kg|g)$/.exec(label);
    if (!matched) {
        return { value: label, unit: "" };
    }
    return { value: matched[1], unit: matched[2] };
}

function createWeightElement(grams, label) {
    const weight = document.createElement("div");
    const labelParts = splitWeightLabel(label);

    weight.className = "weight";
    weight.dataset.grams = String(grams);
    weight.dataset.label = label;

    const valueEl = document.createElement("div");
    valueEl.className = "weightValue";
    valueEl.textContent = labelParts.value;

    const unitEl = document.createElement("div");
    unitEl.className = "weightUnit";
    unitEl.textContent = labelParts.unit;

    weight.appendChild(valueEl);
    weight.appendChild(unitEl);
    addDrag(weight);
    return weight;
}

function createWeights() {
    const setting = difficultySettings[difficultySelect.value] || difficultySettings.normal;
    const count = randomInt(setting.minCount, setting.maxCount);
    const fragment = document.createDocumentFragment();

    for (let i = 0; i < count; i += 1) {
        const created = setting.createValue();
        const grams = created.grams;
        const label = formatWeightLabel(grams, created.label);
        fragment.appendChild(createWeightElement(grams, label));
    }

    weightArea.appendChild(fragment);
    weightCount.textContent = String(count);
}

function removeFromZones(target) {
    leftWeights = leftWeights.filter((item) => item !== target);
    rightWeights = rightWeights.filter((item) => item !== target);
}

function alignZoneWeights(zoneList, zoneElement) {
    zoneList.forEach((weight, index) => {
        snapToZone(weight, zoneElement, index);
    });
}

function getZoneRect(zone) {
    return zone.getBoundingClientRect();
}

function isInsideZone(centerX, centerY, zoneRect) {
    return (
        centerX >= zoneRect.left &&
        centerX <= zoneRect.right &&
        centerY >= zoneRect.top &&
        centerY <= zoneRect.bottom
    );
}

function addDrag(element) {
    let dragging = false;
    let offsetX = 0;
    let offsetY = 0;

    const onPointerMove = (event) => {
        if (!dragging) {
            return;
        }

        event.preventDefault();
        element.style.left = `${event.clientX - offsetX}px`;
        element.style.top = `${event.clientY - offsetY}px`;
    };

    const onPointerUp = (event) => {
        if (!dragging) {
            return;
        }

        dragging = false;
        element.classList.remove("dragging");
        element.releasePointerCapture(event.pointerId);

        leftZone.classList.remove("active");
        rightZone.classList.remove("active");

        const rect = element.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const leftRect = getZoneRect(leftZone);
        const rightRect = getZoneRect(rightZone);

        removeFromZones(element);

        if (isInsideZone(centerX, centerY, leftRect)) {
            leftWeights.push(element);
            snapToZone(element, leftZone, leftWeights.length - 1);
            alignZoneWeights(leftWeights, leftZone);
        } else if (isInsideZone(centerX, centerY, rightRect)) {
            rightWeights.push(element);
            snapToZone(element, rightZone, rightWeights.length - 1);
            alignZoneWeights(rightWeights, rightZone);
        } else {
            weightArea.appendChild(element);
            element.style.position = "relative";
            element.style.left = "0px";
            element.style.top = "0px";
            element.style.zIndex = "1";
        }

        updateScale();
    };

    element.addEventListener("pointerdown", (event) => {
        if (event.button !== 0 && event.pointerType !== "touch") {
            return;
        }

        event.preventDefault();
        dragging = true;
        const rect = element.getBoundingClientRect();
        offsetX = event.clientX - rect.left;
        offsetY = event.clientY - rect.top;

        document.body.appendChild(element);
        element.style.position = "fixed";
        element.style.left = `${rect.left}px`;
        element.style.top = `${rect.top}px`;
        element.style.zIndex = "1000";
        element.classList.add("dragging");
        element.setPointerCapture(event.pointerId);

        leftZone.classList.add("active");
        rightZone.classList.add("active");
    });

    element.addEventListener("pointermove", onPointerMove);
    element.addEventListener("pointerup", onPointerUp);
    element.addEventListener("pointercancel", onPointerUp);
}

function snapToZone(element, zone, index) {
    const rect = zone.getBoundingClientRect();
    const horizontalGap = 44;
    const verticalGap = 24;
    const row = Math.floor(index / 3);
    const column = index % 3;

    document.body.appendChild(element);
    element.style.position = "fixed";
    element.style.left = `${rect.left + 10 + column * horizontalGap}px`;
    element.style.top = `${rect.top + 6 + row * verticalGap}px`;
    element.style.zIndex = "12";
}

function total(weights) {
    return weights.reduce((sum, weight) => sum + Number(weight.dataset.grams || 0), 0);
}

function formatTotal(grams) {
    if (difficultySelect.value === "hard") {
        if (grams >= 1000 && grams % 1000 === 0) {
            return `${grams / 1000}kg`;
        }
        const kg = Math.floor(grams / 1000);
        const rest = grams % 1000;
        if (kg > 0 && rest > 0) {
            return `${kg}kg ${rest}g`;
        }
    }
    return `${grams}g`;
}

function updateScale() {
    const left = total(leftWeights);
    const right = total(rightWeights);
    let angle = (right - left) / 280;

    if (angle > 16) {
        angle = 16;
    }
    if (angle < -16) {
        angle = -16;
    }

    beam.style.transform = `translateX(-50%) rotate(${angle}deg)`;
    leftTotal.textContent = `左: ${formatTotal(left)}`;
    rightTotal.textContent = `右: ${formatTotal(right)}`;
}

function checkAnswer() {
    const left = total(leftWeights);
    const right = total(rightWeights);
    const correct = currentMission && currentMission.check(left, right);

    clearTimers();

    if (correct) {
        score += 1;
        scoreValue.textContent = String(score);
        showMessage("正解！ 次の問題へ進みます。", "correct");
        missionTimer = window.setTimeout(() => {
            newMission();
        }, 1200);
        return;
    }

    showMessage(`ちがう！ 左:${formatTotal(left)} 右:${formatTotal(right)}`, "wrong");
    clearMessageLater();
}

function toggleCodeView() {
    const isOpen = codeViewer.classList.toggle("open");
    if (isOpen) {
        codeOutput.value = `<!DOCTYPE html>\n${document.documentElement.outerHTML}`;
        codeBtn.textContent = "コード非表示";
    } else {
        codeBtn.textContent = "コード表示";
    }
}

difficultySelect.addEventListener("change", () => {
    score = 0;
    scoreValue.textContent = "0";
    newMission();
});

checkBtn.addEventListener("click", checkAnswer);
resetBtn.addEventListener("click", resetBoard);
codeBtn.addEventListener("click", toggleCodeView);

pickMission();
resetBoard();
</script>
